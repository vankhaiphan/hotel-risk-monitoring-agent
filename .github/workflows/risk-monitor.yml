name: Hotel Risk Monitoring

on:
  schedule:
    # Run daily at 9:00 AM Sydney time (UTC+10/+11)
    # 9:00 AM AEDT (UTC+11) = 22:00 UTC previous day
    # Note: During standard time (Apr-Oct), this runs at 10:00 AM. Adjust to '0 23 * * *' if needed.
    - cron: '0 22 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run monitoring
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
      run: python -m src.scheduler --mode once